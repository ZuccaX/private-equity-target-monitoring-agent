services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pe_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
      POSTGRES_DB: ${POSTGRES_DB:-pe_agent_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pe_agent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pe_agent}:${POSTGRES_PASSWORD:-local-development-only}@postgres:5432/${POSTGRES_DB:-pe_agent_db}
      TEST_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pe_agent}:${POSTGRES_PASSWORD:-local-development-only}@postgres:5432/${TEST_POSTGRES_DB:-pe_agent_test}
      CORS_ORIGINS: http://localhost:3000
      EMBEDDING_PROVIDER: hashing
      NEWS_SOURCE_CONFIG: /data/news_sources.json
      NEWS_FIXTURE_ROOT: /data/seed
      SEED_DATA_DIR: /data/seed
      NEWS_ALLOWED_HOSTS: ""
      NEWS_SYNC_API_ENABLED: "true"
      TRIGGER_EXTRACTION_MODE: rules
      TRIGGER_EXTRACTION_VERSION: m3-rules-v1
    volumes:
      - ./data:/data:ro
    command: ["sh", "-c", "python -m scripts.migrate && uvicorn main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pe_agent_postgres_data:
