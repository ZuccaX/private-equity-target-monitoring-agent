name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pe_agent
          POSTGRES_PASSWORD: ci-only-password
          POSTGRES_DB: pe_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pe_agent -d pe_agent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://pe_agent:ci-only-password@localhost:5432/unused_ci_database
      TEST_DATABASE_URL: postgresql+psycopg://pe_agent:ci-only-password@localhost:5432/pe_agent_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall -q app main.py alembic tests
      - run: python -m pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
